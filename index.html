<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>GALERAI | WOLF-TRAP DASHBOARD</title>
    <style>
        body { background: #050505; color: #4ade80; font-family: 'Courier New', monospace; text-align: center; }
        .skull-header { color: #ff0000; font-size: 3rem; text-shadow: 0 0 20px #ff0000; margin: 20px; }
        .counter-box { border: 2px solid #ff0000; display: inline-block; padding: 20px; border-radius: 15px; background: rgba(255,0,0,0.1); }
        .count-number { font-size: 5rem; font-weight: bold; color: #ff0000; }
        .wolf-list { margin-top: 30px; color: #888; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="skull-header">💀 TITAN VETO WALL</div>
    <h1>🏛️ GALERAI: ANTI-DUMP RADAR</h1>
    <p>#BlockchainResurrection | #SovereignTitanGovernment</p>

    <div class="counter-box">
        <h3>SRIGALA NAKAL DIBLOKIR:</h3>
        <div class="count-number" id="wolf-count">0</div>
        <p>STATUS: PROTECTED BY ARCHITECT</p>
    </div>

    <div class="wolf-list">
        <p>> Detecting Predator Activity...</p>
        <p>> Protecting 1,000,000,000,000 $QSTATE Liquidity...</p>
    </div>

    <script>
        // Simulasi update counter (nanti sinkron dengan file txt)
        let trapped = 0;
        setInterval(() => {
            if(Math.random() > 0.7) {
                trapped++;
                document.getElementById('wolf-count').innerText = trapped;

            }
        }, 10000);

</html>
