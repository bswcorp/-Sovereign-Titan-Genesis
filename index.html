<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Titan Genesis | Portal Komando</title>
    <style>
        body { background: #0f172a; color: #38bdf8; font-family: monospace; padding: 20px; text-align: center; }
        .box { border: 2px solid #38bdf8; padding: 20px; border-radius: 10px; max-width: 600px; margin: auto; }
        h1 { color: #f8fafc; }
        .menu-item { margin: 15px 0; text-align: left; background: #1e293b; padding: 10px; border-radius: 5px; }
        button { background: #38bdf8; color: #0f172a; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%; border-radius: 5px; }
        button:hover { background: #f8fafc; }
        input[type="radio"] { margin-right: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🏛️ TITAN COMMAND PORTAL</h1>
        <p>Architect: Andi Muhammad Harpianto</p>
        <hr>

        <div class="menu-item">
            <input type="radio" name="target" id="qst" checked> <label>QuStream (International Market)</label>
            <button onclick="navigate('qst')">BUKA RADAR QST</button>
        </div>

        <div class="menu-item">
            <input type="radio" name="target" id="search"> <label>AJ Search Engine (Mesin Pencari)</label>
            <button onclick="navigate('search')">AKSES MESIN PENCARI</button>
        </div>

        <div class="menu-item">
            <input type="radio" name="target" id="edu"> <label>STG Homeschooling (Sekolah)</label>
            <button onclick="navigate('edu')">MASUK RUANG EDUKASI</button>
        </div>

        <div class="menu-item">
            <input type="radio" name="target" id="eth"> <label>Blockchain Ledger (1T $QSTATE)</label>
            <button onclick="navigate('eth')">VERIFIKASI KONTRAK 0x3AA6</button>
        </div>

        <p style="font-size: 0.8em; color: #94a3b8;">#BlockchainResurrection #TitanGenesis</p>
    </div>

    <script>
        function navigate(type) {
            const links = {
                qst: 'https://coinmarketcap.com',
                search: 'https://github.com',
                edu: 'https://github.com',
                eth: 'https://etherscan.io'
            };
            window.open(links[type], '_blank');
        }
    </script>
</body>
</html>
