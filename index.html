<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STG | Sovereign Titan Genesis</title>
    <style>
        :root { --neon: #00f2ff; --gold: #ffd700; --bg: #050505; }
        body { background: var(--bg); color: #e2e8f0; font-family: 'Courier New', monospace; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* BANNER GAHAR */
        .banner { 
            background: linear-gradient(45deg, #0f172a, #000); 
            height: 200px; display: flex; align-items: center; justify-content: center;
            border-bottom: 2px solid var(--neon); box-shadow: 0 0 20px var(--neon);
            position: relative; overflow: hidden;
        }
        .banner::after { content: "BAREMETAL SOVEREIGNTY"; position: absolute; opacity: 0.1; font-size: 5rem; white-space: nowrap; }

        /* LOGO BAMBU DIGITAL */
        .logo-box { text-align: center; margin-top: -50px; position: relative; z-index: 10; }
        .logo { 
            background: var(--bg); border: 3px solid var(--neon); width: 100px; height: 100px; 
            margin: auto; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: bold; color: var(--neon); box-shadow: 0 0 15px var(--neon);
        }
        .bamboo-icon { color: #4ade80; font-size: 1.5rem; margin-top: 5px; }

        .container { max-width: 700px; margin: 20px auto; padding: 20px; background: #0a0a0a; border-radius: 15px; border: 1px solid #333; }
        .menu-item { background: #111; border-left: 5px solid var(--neon); margin: 15px 0; padding: 15px; border-radius: 0 10px 10px 0; transition: 0.3s; }
        .menu-item:hover { transform: scale(1.02); background: #1a1a1a; }
        
        button { 
            background: var(--neon); color: #000; border: none; padding: 12px; width: 100%; 
            border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px;
        }
        
        /* TOMBOL RADIO KEDAULATAN */
        .radio-group { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; font-size: 0.9rem; }
        input[type="radio"] { accent-color: var(--neon); }

        .footer { font-size: 0.7rem; color: #666; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="banner">
        <h2 style="letter-spacing: 10px; color: var(--gold);">TITAN GENESIS</h2>
    </div>

    <div class="logo-box">
        <div class="logo">STG</div>
        <div class="bamboo-icon">🎋 netpotfarm.tech</div>
    </div>

    <div class="container">
        <p style="text-align:center; color: var(--neon);">ARCHITECT: ANDI MUHAMMAD HARPIANTO</p>
        <p style="text-align:center; font-size: 0.8rem;">#BlockchainResurrection | Contract: 0x3AA6...343F</p>
        <hr style="border: 0.5px solid #222;">

        <div class="menu-item">
            <div class="radio-group"><input type="radio" name="nav" id="r1" checked> <label>QuStream (Radar Harga International)</label></div>
            <button onclick="nav('https://coinmarketcap.com')">AKSES RADAR QST</button>
        </div>

        <div class="menu-item">
            <div class="radio-group"><input type="radio" name="nav" id="r2"> <label>AJ Search Engine (Lini Proyek)</label></div>
            <button onclick="nav('https://github.com')">HUBUNGKAN MESIN PENCARI</button>
        </div>

        <div class="menu-item">
            <div class="radio-group"><input type="radio" name="nav" id="r3"> <label>STG Homeschooling (Lini Proyek)</label></div>
            <button onclick="nav('https://github.com')">MASUK RUANG EDUKASI</button>
        </div>

        <div class="footer">
            VERIFIED BY: BSWCORP | PROTOCOL: QUANTUM-SAFE READY
        </div>
    </div>

    <script>
        function nav(url) { window.open(url, '_blank'); }
    </script>
</body>
</html>
