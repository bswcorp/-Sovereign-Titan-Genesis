<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>TITAN PORTAL | ANDI MUHAMMAD HARPIANTO</title>
    <script src="https://cdnjs.cloudflare.com" type="module"></script>
    <style>
        :root { --gold: #D4AF37; --bg: #050505; --neon: #00f2ff; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        .vault { border: 3px solid var(--gold); padding: 30px; display: inline-block; background: #000; border-radius: 20px; box-shadow: 0 0 30px var(--gold); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { border-color: var(--gold); } 50% { border-color: #ff0000; } 100% { border-color: var(--gold); } }
        .btn { background: var(--neon); color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; border-radius: 10px; }
        input { width: 90%; padding: 10px; margin: 10px 0; background: #111; color: var(--neon); border: 1px solid var(--gold); }
    </style>
</head>
<body>
    <div class="vault">
        <h1 style="color: var(--gold); margin: 0;">SOVEREIGN TITAN</h1>
        <p style="font-size: 0.7rem;">FOUNDER: ANDI MUHAMMAD HARPIANTO</p>
        
        <div style="margin: 20px 0; border-top: 1px solid #333; padding-top: 10px;">
            <div id="status" style="color: #4ade80; font-size: 0.8rem;">● SYSTEM READY</div>
            <div id="balanceDisplay" style="font-size: 2.2rem; margin: 10px 0;">0 AKSA</div>
        </div>

        <button class="btn" id="connectWallet">HUBUNGKAN JANTUNG DIGITAL</button>

        <div id="txPanel" style="display:none; margin-top: 20px; border-top: 1px dashed #444; padding-top: 10px;">
            <p style="font-size: 0.8rem; color: var(--gold);">MENU TRANSFER</p>
            <input type="text" id="targetAddr" placeholder="Alamat Tujuan (0x...)">
            <input type="number" id="sendAmount" placeholder="Jumlah AKSA">
            <button class="btn" style="background: var(--gold);" id="sendBtn">KIRIM SEKARANG</button>
        </div>
    </div>

    <script type="module">
        import { ethers } from "https://cdnjs.cloudflare.com";
        
        // GANTI INI DENGAN ALAMAT DARI BRANKAS_RAHASIA.TXT
        const contractAddress = "0x5aED7342eF2497aEEa4187eE261FAbd6809B4595"; 
        
        const abi = [
            "function balanceOf(address) view returns (uint256)",
            "function transfer(address to, uint256 amount) returns (bool)"
        ];

        let signer, contract;

        document.getElementById('connectWallet').onclick = async () => {
            const provider = new ethers.BrowserProvider(window.ethereum);
            const accounts = await provider.send("eth_requestAccounts", []);
            signer = await provider.getSigner();
            contract = new ethers.Contract(contractAddress, abi, signer);
            
            const bal = await contract.balanceOf(accounts[0]);
            const qstate = ethers.formatUnits(bal, 18);
            const aksa = parseFloat(qstate) * 100000000;
            
            document.getElementById('balanceDisplay').innerText = aksa.toLocaleString() + " AKSA";
            document.getElementById('txPanel').style.display = "block";
            document.getElementById('connectWallet').innerText = "JANTUNG TERHUBUNG";
        };

        document.getElementById('sendBtn').onclick = async () => {
            const to = document.getElementById('targetAddr').value;
            const amt = document.getElementById('sendAmount').value;
            const finalAmt = ethers.parseUnits((amt/100000000).toString(), 18);
            
            alert("Memproses Transfer Aksa...");
            const tx = await contract.transfer(to, finalAmt);
            await tx.wait();
            alert("Transfer Sukses, Bosku!");
            location.reload();
        };
    </script>
</body>
</html>
