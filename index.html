
<!DOCTYPE html>
<html lang="id">
<head>
    <!-- METADATA GLOBAL TITAN (i18n & Standard Compliance) -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="localization" content="L10n-IDN">
    <meta name="globalization" content="G11n-Titan">
    <meta name="internationalization" content="i18n-Compatible">
    
    <title>TITAN PORTAL | ARCHITECT ANDI M. HARPIANTO</title>
    
    <!-- Library Ethers.js untuk Blockchain -->
    <script src="https://cdnjs.cloudflare.com"></script>

    <style>
        :root { --gold: #D4AF37; --bg: #050505; --neon: #00f2ff; --red: #ff3e3e; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; text-align: center; padding: 20px; overflow-x: hidden; }
        
        .vault-frame { 
            border: 4px solid var(--gold); padding: 30px; display: inline-block; 
            background: rgba(0,0,0,0.9); border-radius: 20px; box-shadow: 0 0 40px var(--gold); 
            animation: heartBeat 1.5s infinite; width: 100%; max-width: 500px;
        }
        @keyframes heartBeat {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px var(--gold); }
            50% { transform: scale(1.02); box-shadow: 0 0 50px var(--red); border-color: var(--red); }
        }

        .balance-display { font-size: 2.2rem; color: #fff; margin: 15px 0; text-shadow: 0 0 10px var(--neon); }
        .btn { background: var(--neon); color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 10px; margin-top: 10px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #111; color: var(--neon); border: 1px solid var(--gold); border-radius: 5px; box-sizing: border-box; }
        
        #resilienceDashboard { margin-top: 40px; padding: 20px; border: 1px solid var(--neon); border-radius: 15px; background: rgba(10,10,10,0.9); font-size: 0.8rem; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; }
    </style>
</head>
<body>

    <!-- WIDGET BAHASA GLOBAL -->
    <div id="google_translate_element" style="position:fixed; bottom:20px; right:20px; z-index:9999;"></div>

    <div class="vault-frame">
        <h1 style="color: var(--gold); margin: 0; font-size: 1.5rem;">QUORUM-STATE GENESIS</h1>
        <p style="font-size: 0.7rem; opacity: 0.7;">OTORITAS: ANDI MUHAMMAD HARPIANTO</p>
        
        <div style="border-top: 1px solid #333; margin-top: 15px; padding-top: 15px;">
            <div id="statusLog" style="color: var(--neon); font-size: 0.8rem;">● STANDBY MODE</div>
            <div class="balance-display" id="aksaBalance">0 AKSA</div>
            <div id="qstateBalance" style="color: var(--gold); font-size: 0.8rem;">0 $QSTATE</div>
        </div>

        <button class="btn" id="connectBtn">IDENTIFIKASI WALLET (Cek 1T)</button>

        <!-- EXTERNAL LINKS -->
        <div style="margin-top: 20px; display: flex; gap: 10px;">
            <a href="https://quorumstate.international/" target="_blank" style="flex:1; text-decoration:none;">
                <button class="btn" style="background:#004e92; color:white; font-size:0.6rem;">🌐 GLOBAL SITE</button>
            </a>
            <a href="https://www.qstate.abrdns.com" target="_blank" style="flex:1; text-decoration:none;">
                <button class="btn" style="background:var(--gold); color:black; font-size:0.6rem;">🏛️ CENTRAL BANK</button>
            </a>
        </div>

        <!-- DASHBOARD KETAHANAN -->
        <div id="resilienceDashboard">
            <b style="color: var(--neon);">📊 TITAN RESILIENCE INDEX</b>
            <div style="font-size: 1.5rem; margin: 10px 0;" id="triValue">98.2</div>
            <div class="grid-3">
                <div style="border:1px solid #333; padding:5px;">DOMAIN<br>10Y LOCK</div>
                <div style="border:1px solid #333; padding:5px;">CLOUD<br>5Y LOCK</div>
                <div style="border:1px solid #333; padding:5px;">DATA CNTR<br>5Y LOCK</div>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script>
        // Titan Core ID for Low-Level Mapping
        const TITAN_CORE_ID = [0xA9, 0xAA, 0xAB];
        console.log("i18n Initialized | G11n: Titan | L10n: IDN");

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'id'}, 'google_translate_element');
        }
    </script>
    <script src="//://translate.google.com"></script>

    <script type="module">
        const contractAddress = "0xd9145CCE52D386f254917e481eB44e9943F39138";
        const abi = ["function balanceOf(address) view returns (uint256)"];

        document.getElementById('connectBtn').onclick = async () => {
            if (window.ethereum) {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                const contract = new ethers.Contract(contractAddress, abi, provider);
                const bal = await contract.balanceOf(accounts[0]);
                const qstate = ethers.formatUnits(bal, 18);
                document.getElementById('aksaBalance').innerText = (parseFloat(qstate) * 100000000).toLocaleString() + " AKSA";
                document.getElementById('qstateBalance').innerText = qstate + " $QSTATE";
                document.getElementById('statusLog').innerText = "● JANTUNG TERHUBUNG";
            }
        };
    </script>
</body>
</html>
