<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>TITAN SYMPHONY | ANDI MUHAMMAD HARPIANTO</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        :root { --gold: #D4AF37; --bg: #050505; --neon: #00f2ff; --red: #ff3e3e; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; text-align: center; padding: 20px; overflow-x: hidden; }
        
        /* EFEK LATAR BELAKANG PARTIKEL EMAS */
        #goldParticles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #111 0%, #050505 100%); }
        .particle { position: absolute; background: var(--gold); border-radius: 50%; opacity: 0.3; animation: float 10s infinite linear; }
        @keyframes float { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 50% { opacity: 0.5; } 100% { transform: translateY(-10vh) scale(1.2); opacity: 0; } }

        /* FRAME EMAS BERDENYUT JANTUNG */
        .vault-frame { 
            border: 4px solid var(--gold); padding: 40px; display: inline-block; 
            background: rgba(0,0,0,0.9); border-radius: 25px; box-shadow: 0 0 40px var(--gold); 
            animation: heartBeat 1.5s infinite; max-width: 450px; position: relative;
        }
        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); border-color: var(--red); box-shadow: 0 0 60px var(--red); }
        }

        .balance-display { font-size: 2.5rem; color: #fff; margin: 20px 0; text-shadow: 0 0 15px var(--neon); transition: all 0.5s ease; }
        .btn { background: var(--neon); color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 10px; text-transform: uppercase; margin-top: 10px; position: relative; overflow: hidden; }
        .btn::after { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.4), transparent); transform: rotate(45deg); animation: shine 3s infinite; }
        @keyframes shine { 0% { left: -100%; } 100% { left: 100%; } }
        
        .status-tag { color: #4ade80; font-size: 0.8rem; letter-spacing: 2px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #111; color: var(--neon); border: 1px solid var(--gold); border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="goldParticles"></div>

    <!-- AUDIO TITAN SYMPHONY -->
    <audio id="titanAudio" loop>
        <source src="https://www.soundhelix.com" type="audio/mpeg">
    </audio>

    <div class="vault-frame">
        <h1 style="color: var(--gold); margin: 0; letter-spacing: 3px;">SOVEREIGN TITAN</h1>
        <p style="font-size: 0.8rem; opacity: 0.8;">CORE PORTAL: ANDI MUHAMMAD HARPIANTO</p>
        
        <div style="border-top: 1px solid #333; margin-top: 20px; padding-top: 20px;">
            <div class="status-tag" id="statusLog">● WAITING FOR IDENTIFICATION</div>
            <div class="balance-display" id="aksaBalance">0 AKSA</div>
            <div style="color: var(--gold); font-size: 0.9rem;" id="qstateBalance">0.00 $QSTATE</div>
        </div>

        <button class="btn" id="connectBtn">HUBUNGKAN JANTUNG DIGITAL</button>

        <div id="transferPanel" style="display:none; margin-top: 30px; border-top: 1px dashed #444; padding-top: 20px;">
            <input type="text" id="targetAddr" placeholder="Alamat Tujuan (0x...)">
            <input type="number" id="sendAmt" placeholder="Jumlah AKSA">
            <button class="btn" style="background: var(--gold);" id="sendBtn">EKSEKUSI TRANSFER</button>
        </div>
    </div>

    <script>
        // --- 1. Partikel Emas ---
        const container = document.getElementById('goldParticles');
        for (let i = 0; i < 40; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.width = Math.random() * 3 + 'px';
            p.style.height = p.style.width;
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (Math.random() * 5 + 5) + 's';
            p.style.animationDelay = (Math.random() * 5) + 's';
            container.appendChild(p);
        }

        // --- 2. Logika Blockchain Live ---
        const contractAddress = "0x66B3b7232093888b68570463b23b2Fe8b8B75Db7"; 
        const abi = ["function balanceOf(address) view returns (uint256)", "function transfer(address to, uint256 amount) returns (bool)"];
        let signer, contract, userAccount;

        async function updateLiveBalance() {
            if (contract && userAccount) {
                const rawBal = await contract.balanceOf(userAccount);
                const qstate = ethers.formatUnits(rawBal, 18);
                const aksa = parseFloat(qstate) * 100000000;
                
                const display = document.getElementById('aksaBalance');
                const oldVal = display.innerText;
                const newVal = aksa.toLocaleString('id-ID') + " AKSA";
                
                if (oldVal !== newVal) {
                    display.style.color = "var(--neon)";
                    display.innerText = newVal;
                    document.getElementById('qstateBalance').innerText = parseFloat(qstate).toLocaleString('id-ID') + " $QSTATE";
                    setTimeout(() => { display.style.color = "#fff"; }, 500);
                }
            }
        }

        document.getElementById('connectBtn').onclick = async () => {
            if (window.ethereum) {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                userAccount = accounts[0];
                signer = await provider.getSigner();
                contract = new ethers.Contract(contractAddress, abi, signer);
                
                document.getElementById('titanAudio').play(); // Play Guitar/Drum
                document.getElementById('statusLog').innerText = "● LIVE DATA SYNCED";
                document.getElementById('transferPanel').style.display = "block";
                document.getElementById('connectBtn').innerText = "IDENTIFIED";
                
                setInterval(updateLiveBalance, 3000); // Poling Real-time tiap 3 detik (Tanpa Refresh)
            }
        };

        document.getElementById('sendBtn').onclick = async () => {
            const to = document.getElementById('targetAddr').value;
            const amt = document.getElementById('sendAmt').value;
            try {
                const tx = await contract.transfer(to, ethers.parseUnits((amt/100000000).toString(), 18));
                document.getElementById('statusLog').innerText = "● PROCESSING TRANSACTION...";
                await tx.wait();
                alert("Transfer Berhasil!");
            } catch (err) { alert("Gagal: " + err.message); }
        };
    </script>
</body>
</html>
