<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUORUM-STATE | Sovereign Bank</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --cyan: #00f2ff; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 20px; }
        .card { border: 2px solid var(--gold); padding: 30px; background: rgba(20,20,20,0.9); box-shadow: 0 0 30px rgba(212,175,55,0.3); max-width: 550px; margin: auto; border-radius: 15px; }
        h1 { font-family: 'Orbitron'; color: var(--gold); text-align: center; letter-spacing: 5px; text-transform: uppercase; }
        label { display: block; margin-top: 15px; color: var(--gold); font-size: 0.8rem; text-transform: uppercase; }
        input { width: 100%; padding: 15px; margin: 8px 0; background: #000; color: var(--cyan); border: 1px solid var(--cyan); box-sizing: border-box; font-family: 'Rajdhani'; font-size: 1.1rem; }
        .btn { width: 100%; padding: 20px; font-weight: bold; cursor: pointer; margin-top: 15px; font-family: 'Orbitron'; border: none; transition: 0.3s; }
        .btn-connect { background: var(--gold); color: black; }
        .btn-send { background: var(--cyan); color: black; }
        .btn:hover { opacity: 0.8; transform: scale(1.02); }
        #status { margin-top: 25px; padding: 15px; border: 1px solid #333; background: #111; font-size: 0.85rem; color: #00ff00; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>QUORUM-STATE</h1>
        <p style="text-align: center; color: var(--cyan); margin-top: -10px;">INTERPLANETARY SOVEREIGN BANK</p>
        
        <label>1. SMART CONTRACT ADDRESS (Dari Remix):</label>
        <input type="text" id="contractAddr" placeholder="0x..." value="">

        <label>2. TUJUAN (Hot Wallet MetaMask):</label>
        <input type="text" id="toAddr" value="0xD9a1E28224d6d047Eef8712dC97d11A9032b948e" readonly>

        <label>3. JUMLAH KOIN $QSTATE:</label>
        <input type="number" id="amount" value="1000">

        <button onclick="connect()" id="btnC" class="btn btn-connect">HUBUNGKAN DOMPET</button>
        <button onclick="send()" id="btnS" class="btn btn-send">PINDAHKAN KE HOT WALLET</button>

        <div id="status"></div>
    </div>

    <script type="module">
        import { ethers } from "https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.min.js";
        let signer = null;

        window.connect = async () => {
            if (!window.ethereum) return alert("Instal MetaMask!");
            const provider = new ethers.BrowserProvider(window.ethereum);
            signer = await provider.getSigner();
            document.getElementById('btnC').innerText = "DOMPET TERHUBUNG";
            updateStatus("Dompet tersambung. Silakan masukkan alamat kontrak.");
        };

        window.send = async () => {
            if (!signer) return alert("Klik 'Hubungkan Dompet' terlebih dahulu!");
            const contract = document.getElementById('contractAddr').value;
            const amount = document.getElementById('amount').value;
            if (!contract.startsWith("0x")) return alert("Alamat Kontrak tidak valid!");

            try {
                updateStatus("Menunggu konfirmasi transaksi di MetaMask...");
                const abi = ["function transfer(address to, uint256 amount) public returns (bool)"];
                const token = new ethers.Contract(contract, abi, signer);
                const tx = await token.transfer("0xD9a1E28224d6d047Eef8712dC97d11A9032b948e", ethers.parseUnits(amount, 18));
                updateStatus("Transaksi Terkirim! Hash: " + tx.hash);
                await tx.wait();
                updateStatus("SUKSES! Koin $QSTATE telah mendarat di Hot Wallet.");
            } catch (err) {
                updateStatus("GAGAL: " + (err.reason || err.message));
            }
        };

        function updateStatus(msg) {
            const s = document.getElementById('status');
            s.style.display = "block"; s.innerText = "SISTEM: " + msg;
        }
    </script>
</body>
</html>
