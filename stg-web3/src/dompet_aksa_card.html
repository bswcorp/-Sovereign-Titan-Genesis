<div class="wallet-card" style="border: 1px solid #d4af37; background: rgba(10,10,10,0.95); padding: 25px; color: #00ffcc; font-family: monospace; width: 380px; margin: 20px auto; box-shadow: 0 0 20px rgba(0,255,200,0.15);">
  <h3 style="color: #00ffaa; letter-spacing: 2px; margin-top: 0;">🏛️ DOMPET AKSA INTERFACE</h3>
  <p id="walletAddress" style="font-size: 0.8em; color: #aaa; word-break: break-all;">Wallet: [Not Connected]</p>
  <p id="walletBalance" style="font-size: 1.5em; font-weight: bold; color: #ffd700; margin: 15px 0;">Balance: 0 QBC</p>
  <button onclick="connectWallet()" style="background: transparent; border: 1px solid #d4af37; color: #d4af37; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%;">CONNECT SOVEREIGN WALLET</button>
</div>

<script src="ethers.io" type="application/javascript"></script>
<script type="module">
import { CONTRACT_ADDRESS, MINIMAL_ABI } from "./services/wallet.js";

window.connectWallet = async function() {
  if (!window.ethereum) {
    alert("MetaMask / Titan Shield Hardware not detected.");
    return;
  }

  try {
    const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
    const address = accounts[0];
    document.getElementById("walletAddress").innerText = "Wallet: " + address;

    const provider = new ethers.providers.Web3Provider(window.ethereum);
    const contract = new ethers.Contract(CONTRACT_ADDRESS, MINIMAL_ABI, provider);

    const balance = await contract.balanceOf(address);
    const symbol = await contract.symbol();
    
    // Konversi BigNumber ke format desimal koin standar
    const formattedBalance = ethers.utils.formatUnits(balance, 18);
    document.getElementById("walletBalance").innerText = `Balance: ${formattedBalance} ${symbol}`;
  } catch (err) {
    console.error("Connection failed:", err);
  }
}
</script>
