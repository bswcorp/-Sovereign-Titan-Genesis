<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>STG-Chain | Minimal Ledger Explorer</title>
    <style>
        body { background: #070707; color: #00ff00; font-family: 'Courier New', monospace; padding: 20px; }
        .explorer-card { border: 1px solid #d4af37; background: #111; padding: 20px; margin-bottom: 20px; box-shadow: 0 0 15px rgba(212,175,55,0.1); }
        .input-field { background: #000; border: 1px solid #333; color: #fff; padding: 10px; width: 300px; }
        .query-btn { border: 1px solid #00ff00; background: transparent; color: #00ff00; padding: 10px 20px; cursor: pointer; }
        .query-btn:hover { background: #00ff00; color: #000; }
    </style>
</head>
<body>
    <div class="explorer-card">
        <h2>🛰️ STG-CHAIN MISSION CONTROL EXPLORER</h2>
        <p style="color: #888;">REAL-TIME LEDGER VERIFICATION NODE</p>
        <hr color="#d4af37">
        
        <div style="margin: 20px 0;">
            <input type="text" id="queryInput" class="input-field" placeholder="Enter Block Number (hex) or Wallet Address...">
            <button class="query-btn" onclick="queryChain()">QUERY NETWORK</button>
        </div>

        <pre id="outputDisplay" style="color: #aaa; text-align: left; background: #000; padding: 15px; border-left: 3px solid #d4af37;">[System Status]: Awaiting user trace command...</pre>
    </div>

        <script>
async function queryChain() {

    const output = document.getElementById("outputDisplay");

    output.innerText = "[RPC] Connecting to STG Sovereign Node...";

    try {

        // Query latest block
        const response = await fetch("http://localhost:8545", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                jsonrpc: "2.0",
                method: "eth_blockNumber",
                params: [],
                id: 1
            })
        });

        const data = await response.json();

        output.innerText =
            "🛰️ STG CHAIN LIVE\n\n" +
            "Latest Block: " + data.result + "\n" +
            "RPC Status: ONLINE\n" +
            "Chain ID: 777";

    } catch (err) {

        output.innerText =
            "[ERROR] Failed connecting to STG RPC\n\n" +
            err;
    }
}
</script>
</body>
</html>
