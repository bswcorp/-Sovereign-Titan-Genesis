user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 🔒 Rate Limiting Security Layer to prevent RPC DDoS saturation
    limit_req_zone $binary_remote_addr zone=rpc_limit:10m rate=50r/s;

    upstream stg_http_rpc {
        server 127.0.0.1:8545; # Standard HTTP JSON-RPC port
    }

    upstream stg_ws_rpc {
        server 127.0.0.1:8546; # Stateful WebSocket Event stream port
    }

    # Redirect all insecure HTTP traffic straight to HTTPS
    server {
        listen 80;
        server_name rpc.quorumstate.international;
        return 301 https://$host$request_uri;
    }

    # 🛡️ SECURE SOVEREIGN ENDPOINT INTERFACE
    server {
        listen 443 ssl;
        server_name rpc.quorumstate.international;

        # TLS Cryptographic certificates path mapping
        ssl_certificate /etc/letsencrypt/live/rpc.quorumstate.international/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/rpc.quorumstate.international/privkey.pem;
        
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Route 1: Standard JSON-RPC Endpoint (MetaMask / Ethers.js)
        location / {
            limit_req zone=rpc_limit burst=20 nodelay;
            proxy_pass http://stg_http_rpc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route 2: Persistent WebSocket Channel (Live Explorer Streams)
        location /ws {
            proxy_pass http://stg_ws_rpc;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
