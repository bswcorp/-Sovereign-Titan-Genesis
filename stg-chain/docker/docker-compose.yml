version: '3.8'

services:
  stg-node:
    image: golang:1.21-alpine
    container_name: stg-node-devnet
    volumes:
      - ../:/app
    working_dir: /app
    command: go run cmd/stg-node/main.go --genesis core/genesis.json --rpc.port 8545
    ports:
      - "30303:30303"
    networks:
      - stg-network

  nginx:
    image: nginx:alpine
    container_name: stg-nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - stg-node
    networks:
      - stg-network

networks:
  stg-network:
    driver: bridge
