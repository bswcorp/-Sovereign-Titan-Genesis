<!DOCTYPE html>
<html>
<head>
    <script src="https://aframe.io"></script>
    <style>
        .ar-overlay { position: fixed; top: 10%; width: 100%; color: #d4af37; font-family: 'Courier New', monospace; z-index: 100; pointer-events: none; }
        .glitch { font-size: 5em; font-weight: bold; text-shadow: 0 0 20px #d4af37; animation: glitch-anim 2s infinite; }
        @keyframes glitch-anim { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.05); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">
    <div class="ar-overlay">
        <div class="glitch">Rp 1.498.000.000.000.000</div>
        <div style="letter-spacing: 10px;">UNIT 008 COLLATERAL VERIFIED</div>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
        <!-- Partikel Emas Bergerak -->
        
            <a-sphere position="0 1.25 -1" radius="1.25" color="#d4af37" material="opacity: 0.2; transparent: true"></a-sphere>
            <a-torus-knot position="0 1.25 -1" radius="0.5" radius-tubular="0.05" color="#00ff00"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 3000"></a-torus-knot>
        
        
        <a-sky color="#000" opacity="0.1"></a-sky>
    </a-scene>
</body>
</html>
