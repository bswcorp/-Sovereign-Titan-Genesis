<!DOCTYPE html>
<html>
<head>
    <style>
        .banner-container {
            width: 100%;
            height: 450px;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            border-bottom: 2px solid #d4af37;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            font-family: 'Courier New', monospace;
        }
        .glow-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://transparenttextures.com');
            opacity: 0.1;
        }
        .badge-preview {
            width: 280px;
            filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.4));
            animation: float 4s ease-in-out infinite;
            z-index: 2;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        .text-side {
            margin-left: 50px;
            z-index: 2;
            text-align: left;
        }
        .headline {
            color: #d4af37;
            font-size: 2.5em;
            font-weight: bold;
            letter-spacing: 5px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }
        .subline {
            color: #00ff00;
            font-size: 1.2em;
            margin-top: 10px;
            border-left: 3px solid #00ff00;
            padding-left: 15px;
        }
        .cta-button {
            margin-top: 30px;
            padding: 15px 30px;
            background: transparent;
            border: 1px solid #d4af37;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.3s;
        }
        .cta-button:hover {
            background: #d4af37;
            color: #000;
            box-shadow: 0 0 20px #d4af37;
        }
    </style>
</head>
<body>

<div class="banner-container">
    <div class="glow-overlay"></div>
    
    <!-- Image placeholder for the Badge -->
    <img src="https://quorumstate.international" alt="Genesis Badge" class="badge-preview">

    <div class="text-side">
        <div class="headline">TITAN GUARDIAN CALL</div>
        <div class="subline">BECOME ONE OF THE FIRST 1,000 PROTECTORS</div>
        <p style="color: #888; width: 400px; font-size: 0.8em; line-height: 1.5;">
            Audit the Nusantara-Root. Secure the Unit 008. 
            Claim your Soulbound Badge and be etched into the Genesis Block of STG-Chain forever.
        </p>
        <button class="cta-button" onclick="window.location.href='#bounty'">Join the Vanguard</button>
    </div>
</div>

</body>
</html>
